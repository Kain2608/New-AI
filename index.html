<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Movie System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-slate-200">
    <div class="max-w-6xl mx-auto px-6 py-10">
        <h1 class="text-3xl font-bold mb-8 text-center">Hệ Thống Gợi Ý Phim <span class="text-blue-500 underline">Collaborative Filtering</span></h1>
        
        <div class="flex justify-center mb-12">
            <div class="bg-slate-800 p-2 rounded-xl flex shadow-lg w-full max-w-md border border-slate-700">
                <input type="number" id="userId" placeholder="Nhập User ID (VD: 1, 10, 50...)" 
                       class="bg-transparent border-none focus:ring-0 flex-1 px-4 outline-none">
                <button onclick="fetchMovies()" class="bg-blue-600 px-6 py-2 rounded-lg font-bold hover:bg-blue-500 transition">Gợi ý</button>
            </div>
        </div>

        <div id="loading" class="hidden text-center text-blue-400 animate-pulse">Đang tính toán ma trận tương đồng...</div>
        
        <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
            </div>
    </div>

    <script>
        async function fetchMovies() {
            const uid = document.getElementById('userId').value;
            const grid = document.getElementById('movieGrid');
            const loader = document.getElementById('loading');
            
            if(!uid) return alert("Vui lòng nhập ID!");

            loader.classList.remove('hidden');
            grid.innerHTML = '';

            try {
                // Gọi tới backend Flask
                const res = await fetch(`http://127.0.0.1:5000/predict?user_id=${uid}`);
                const data = await res.json();
                
                loader.classList.add('hidden');
                
                data.forEach(movie => {
                    grid.innerHTML += `
                        <div class="bg-slate-800 rounded-lg overflow-hidden border border-slate-700 hover:scale-105 transition-transform">
                            <img src="${movie.poster}" class="w-full h-56 object-cover bg-gray-700">
                            <div class="p-3 text-sm font-semibold truncate">${movie.title}</div>
                        </div>
                    `;
                });
            } catch (err) {
                loader.innerText = "Lỗi kết nối Backend!";
            }
        }
    </script>
</body>
</html>
